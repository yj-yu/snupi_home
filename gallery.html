---
layout: default
title: Gallery
section_id: gallery
count_year_max: 2023
count_year_min: 2023
---

<style>
  /* -----------------------------------------------------------
     1. 전역 설정 및 레이아웃 유지 (PC/모바일 공통)
  ----------------------------------------------------------- */
  .grid-container {
    display: grid;
    gap: 22px; /* 아이템 간 간격 증가 */
    padding: 10px;
  }

  /* 기존의 3열/1열 구조를 유지하는 클래스가 있다고 가정하고 내부 아이템 스타일만 정의 */
  .location-listing {
    position: relative;
    display: block;
    background: #fff; /* 카드 배경색 */
    border: 1px solid rgba(209, 220, 235, 0.85);
    border-radius: 12px; /* 모서리 둥글게 */
    overflow: hidden; /* 이미지가 넘치지 않도록 */
    box-shadow: 0 8px 24px rgba(31, 56, 88, 0.06); /* 은은한 그림자 */
    transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
    text-decoration: none;
  }

  .location-image img {
    width: 100%;
    display: block;
    transition: filter 0.28s ease, transform 0.28s ease;
  }

  /* -----------------------------------------------------------
     2. 모바일 디자인 (기본): 타이틀을 예쁘고 크게, 사진 블러 없음
  ----------------------------------------------------------- */
  
  /* 모바일에서는 hover 시 블러 효과 완전 제거 */
  .location-listing:hover .location-image img {
    filter: none !important;
  }

  .location-title {
    /* [위치 고정] 이미지 아래에 항상 표시 */
    position: relative !important;
    opacity: 1 !important;
    visibility: visible !important;
    top: auto !important;
    transform: none !important;
    display: block !important;
    height: auto !important;
    width: 100% !important;

    /* [디자인 변경] 단순 텍스트가 아닌 디자인된 영역처럼 설정 */
    background: #fdfdfd !important; /* 아주 밝은 회색 배경 */
    color: #21395f !important;        /* 진한 글자색 */
    padding: 20px 15px 10px !important; /* 여백 증가 */
    border-top: 1px solid #eee;    /* 이미지와 구분선 */
    text-align: center;
    
    /* [타이틀 크기 및 서체] 더 크고 돋보이게 */
    font-size: 20px !important;
    font-weight: 700 !important;   /* 아주 굵게 */
    letter-spacing: -0.5px;        /* 자간 좁혀서 세련되게 */
    line-height: 1.3;
    }
    
  /* -----------------------------------------------------------
     3. PC 디자인 (768px 이상): 기존의 고급스러운 호버 효과 유지
  ----------------------------------------------------------- */
  @media (min-width: 768px) {
    .grid-container {
      grid-template-columns: repeat(3, 1fr); /* 3열로 변경 */
    }

    .location-listing:hover {
      transform: translateY(-5px); /* 살짝 위로 떠오르는 효과 */
      border-color: rgba(147, 197, 253, 0.9);
      box-shadow: 0 18px 42px rgba(31, 56, 88, 0.12); /* 그림자 강화 */
    }

    .location-title {
      /* [위치 변경] 다시 이미지 위로 올림 */
      position: absolute !important;
      top: 0 !important;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      align-items: center;
      justify-content: center;
      
      /* [초기 상태] 숨김 */
      opacity: 0 !important;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(239, 246, 255, 0.82)) !important;
      color: #18345c !important;
      transition: opacity 0.28s ease;
      pointer-events: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      
      /* [PC 전용 스타일] 모바일 장식 제거 */
      border-top: none !important;
      border-bottom: none !important;
      padding: 24px !important;
      font-size: 22px !important;    /* PC에서는 조금 더 크게 */
      line-height: 1.25;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    .location-listing:hover .location-title {
      /* [호버 상태] 나타남 */
      opacity: 1 !important;
    }

    .location-listing:hover .location-image img {
      filter: saturate(0.94) brightness(1.04);
      transform: scale(1.035);
    }
  }
</style>


<div class='full parallax' style='padding-top: 50px;'>
  <div class='row'>
    <div class='twelve columns'>
      {% include section-header.html title="Gallery" color="#464646" tagline=" " class="big" %}
    </div>
  </div>
  <div class='spacing'></div>
</div>
<div class='full no-padding'>
  <div class="child-page-listing">

    
    <div class="row">
      <div class="grid-container">
        {% for photo in site.gallery reversed %}
        <article id="3685" class="location-listing">
    
          <div class="location-title" href="#" >
            {{photo.description}}           </div>
    
          <div class="location-image">
            <img class="avatar" src="images/gallery/{{photo.img-filename}}" alt="{{photo.description}}">
    
          </div>
    
        </article>
        {% endfor %}
    
      </div>
      <!-- end grid container -->
  </div>
  </div>
</div>
<div class='four spacing'></div>
