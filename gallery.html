---
layout: default
title: Gallery
section_id: gallery
count_year_max: 2023
count_year_min: 2023
---

<style>
  /* -----------------------------------------------------------
     1. 전역 설정 및 레이아웃 유지 (PC/모바일 공통)
  ----------------------------------------------------------- */
  .grid-container {
    display: grid;
    gap: 22px;
    padding: 10px;
  }

  /* 기존의 3열/1열 구조를 유지하는 클래스가 있다고 가정하고 내부 아이템 스타일만 정의 */
  .location-listing {
    position: relative;
    display: block;
    background: #fff;
    border: 1px solid rgba(209, 220, 235, 0.85);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(31, 56, 88, 0.06);
    transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
    text-decoration: none;
  }

  .location-image img {
    width: 100%;
    display: block;
    transition: filter 0.28s ease, transform 0.28s ease;
  }

  /* -----------------------------------------------------------
     2. 모바일 디자인 (기본): 제목은 탭했을 때만 표시
  ----------------------------------------------------------- */
  
  /* 모바일에서는 hover 시 블러 효과 완전 제거 */
  .location-listing:hover .location-image img {
    filter: none !important;
  }

  .location-title {
    position: absolute !important;
    opacity: 0 !important;
    visibility: visible !important;
    top: auto !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    transform: none !important;
    display: flex !important;
    align-items: flex-end;
    justify-content: center;
    height: auto !important;
    width: 100% !important;
    min-height: 42%;
    background: linear-gradient(180deg, rgba(15, 23, 42, 0), rgba(15, 23, 42, 0.58)) !important;
    color: #fff !important;
    padding: 28px 8px 8px !important;
    border-top: 0 !important;
    text-align: center;
    font-size: 0.72rem !important;
    font-weight: 750 !important;
    letter-spacing: 0;
    line-height: 1.18;
    pointer-events: none;
    text-shadow: 0 1px 8px rgba(15, 23, 42, 0.45);
    transition: opacity 0.22s ease;
    }

  @media (max-width: 767px) {
    .grid-container {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 0 14px 18px;
    }

    .location-listing {
      width: 100%;
      max-width: none;
      margin: 0;
      border: 0;
      border-radius: 11px;
      box-shadow: none;
      background: #f8fafc;
      cursor: pointer;
    }

    .location-image img {
      aspect-ratio: 1 / 0.78;
      height: auto;
      object-fit: cover;
    }

    .location-title {
      font-size: 0.72rem !important;
    }

    .location-listing:not(.is-open) .location-title {
      opacity: 0 !important;
    }

    .location-listing.is-open .location-title {
      opacity: 1 !important;
    }

    .location-listing.is-open .location-image img {
      filter: blur(0.8px) !important;
      transform: scale(1.012);
    }
  }
    
  /* -----------------------------------------------------------
     3. PC 디자인 (768px 이상): 기존의 고급스러운 호버 효과 유지
  ----------------------------------------------------------- */
  @media (min-width: 768px) {
    .grid-container {
      grid-template-columns: repeat(3, 1fr); /* 3열로 변경 */
    }

    .location-listing:hover {
      transform: none;
      border-color: rgba(209, 220, 235, 0.85);
      box-shadow: 0 8px 24px rgba(31, 56, 88, 0.06);
    }

    .location-title {
      /* [위치 변경] 다시 이미지 위로 올림 */
      position: absolute !important;
      top: 0 !important;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      align-items: center;
      justify-content: center;
      
      /* [초기 상태] 숨김 */
      opacity: 0 !important;
      background: rgba(15, 23, 42, 0.34) !important;
      color: #fff !important;
      transition: opacity 0.28s ease;
      pointer-events: none;
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      
      /* [PC 전용 스타일] 모바일 장식 제거 */
      border-top: none !important;
      border-bottom: none !important;
      padding: 24px !important;
      font-size: 22px !important;    /* PC에서는 조금 더 크게 */
      line-height: 1.25;
      text-shadow: 0 1px 8px rgba(15, 23, 42, 0.45);
    }

    .location-listing:hover .location-title {
      /* [호버 상태] 나타남 */
      opacity: 1 !important;
    }

    .location-listing:hover .location-image img {
      filter: blur(0.4px);
      transform: none;
    }
  }
</style>


<div class='full parallax' style='padding-top: 50px;'>
  <div class='row'>
    <div class='twelve columns'>
      {% include section-header.html title="Gallery" color="#464646" tagline=" " class="big" %}
    </div>
  </div>
  <div class='spacing'></div>
</div>
<div class='full no-padding'>
  <div class="child-page-listing">

    
    <div class="row">
      <div class="grid-container">
        {% for photo in site.gallery reversed %}
        <article id="3685" class="location-listing">
    
          <div class="location-title" href="#" >
            {{photo.description}}           </div>
    
          <div class="location-image">
            <img class="avatar" src="images/gallery/{{photo.img-filename}}" alt="{{photo.description}}">
    
          </div>
    
        </article>
        {% endfor %}
    
      </div>
      <!-- end grid container -->
  </div>
  </div>
</div>
<div class='four spacing'></div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var mobileGallery = window.matchMedia('(max-width: 767px)');
    document.querySelectorAll('.location-listing').forEach(function (card) {
      card.addEventListener('click', function () {
        if (mobileGallery.matches) {
          card.classList.toggle('is-open');
        }
      });
    });
  });
</script>
