---
layout: default
title: Gallery
section_id: gallery
count_year_max: 2023
count_year_min: 2023
---

<style>
  /* 1. 모바일 : 사진 아래에 설명이 항상 보임 */
  .location-listing {
    position: relative;
    display: block;
    margin-bottom: 30px; /* 아이템 간 간격 */
    text-decoration: none;
  }

  .location-image img {
    width: 100%;
    display: block;
    transition: filter 0.3s ease;
  }

  .location-title {
    position: relative !important; /* 이미지 위가 아니라 아래에 배치 */
    opacity: 1 !important;         /* 항상 보이게 */
    visibility: visible !important;
    background: transparent !important; 
    color: #333 !important;        /* 글자 색상 (배경이 밝을 때) */
    padding: 10px 0 !important;
    text-align: center;
    font-weight: bold;
    font-size: 14px;
    height: auto !important;
    transform: none !important;
  }

  /* 2. PC (768px 이상): 기존처럼 마우스 올릴 때만 설명 표시 */
  @media (min-width: 768px) {
    .location-title {
      position: absolute !important; /* 다시 이미지 위로 띄움 */
      top: 0 !important;
      left: 0;
      width: 100%;
      height: 100% !important;
      display: flex !important;
      align-items: center;
      justify-content: center;
      opacity: 0 !important;         /* 평소엔 투명 */
      background: rgba(0, 0, 0, 0.5) !important; /* 검정 반투명 배경 */
      color: white !important;       /* 글자 색상 화이트로 변경 */
      transition: opacity 0.3s ease;
      pointer-events: none;          /* 마우스 이벤트 방해 금지 */
    }

    .location-listing:hover .location-title {
      opacity: 1 !important;         /* 호버 시 나타남 */
    }

    .location-listing:hover .location-image img {
      filter: blur(4px);             /* 호버 시 블러 처리 */
    }
  }
</style>


<div class='full parallax' style='padding-top: 50px;'>
  <div class='row'>
    <div class='twelve columns'>
      {% include section-header.html title="Gallery" color="#464646" tagline=" " class="big" %}
    </div>
  </div>
  <div class='spacing'></div>
</div>
<div class='full no-padding'>
  <div class="child-page-listing">

    
    <div class="row">
      <div class="grid-container">
        {% for photo in site.gallery reversed %}
        <article id="3685" class="location-listing">
    
          <div class="location-title" href="#" >
            {{photo.description}}           </div>
    
          <div class="location-image">
            <img class="avatar" src="images/gallery/{{photo.img-filename}}" alt="{{photo.description}}">
    
          </div>
    
        </article>
        {% endfor %}
    
      </div>
      <!-- end grid container -->
  </div>
  </div>
</div>
<div class='four spacing'></div>
