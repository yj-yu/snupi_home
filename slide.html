  <script type="text/javascript">

        $(document).ready(function() {
        
        var $slider = $(".slider"),
            $slideBGs = $(".slide__bg"),
            diff = 0,
            curSlide = 0,
            numOfSlides = $(".slide").length-1,
            animating = false,
            animTime = 500,
            autoSlideTimeout,
            autoSlideDelay = 6000,
            $pagination = $(".slider-pagi");
        
        function createBullets() {
            for (var i = 0; i < numOfSlides+1; i++) {
            var $li = $("<li class='slider-pagi__elem'></li>");
            $li.addClass("slider-pagi__elem-"+i).data("page", i);
            if (!i) $li.addClass("active");
            $pagination.append($li);
            }
        };
        
        createBullets();
        
        function manageControls() {
            $(".slider-control").removeClass("inactive");
            if (!curSlide) $(".slider-control.left").addClass("inactive");
            if (curSlide === numOfSlides) $(".slider-control.right").addClass("inactive");
        };
        
        function autoSlide() {
            autoSlideTimeout = setTimeout(function() {
            curSlide++;
            if (curSlide > numOfSlides) curSlide = 0;
            changeSlides();
            }, autoSlideDelay);
        };
        
        autoSlide();
        
        function changeSlides(instant) {
            if (!instant) {
            animating = true;
            manageControls();
            $slider.addClass("animating");
            $slider.css("top");
            $(".slide").removeClass("active");
            $(".slide-"+curSlide).addClass("active");
            setTimeout(function() {
                $slider.removeClass("animating");
                animating = false;
            }, animTime);
            }
            window.clearTimeout(autoSlideTimeout);
            $(".slider-pagi__elem").removeClass("active");
            $(".slider-pagi__elem-"+curSlide).addClass("active");
            $slider.css("transform", "translate3d("+ -curSlide*100 +"%,0,0)");
            $slideBGs.css("transform", "translate3d("+ curSlide*50 +"%,0,0)");
            diff = 0;
            autoSlide();
        }

        function navigateLeft() {
            if (animating) return;
            if (curSlide > 0) curSlide--;
            changeSlides();
        }

        function navigateRight() {
            if (animating) return;
            if (curSlide < numOfSlides) curSlide++;
            changeSlides();
        }

        $(document).on("mousedown touchstart", ".slider", function(e) {
            if (animating) return;
            window.clearTimeout(autoSlideTimeout);
            var startX = e.pageX || e.originalEvent.touches[0].pageX,
                winW = $(window).width();
            diff = 0;
            
            $(document).on("mousemove touchmove", function(e) {
            var x = e.pageX || e.originalEvent.touches[0].pageX;
            diff = (startX - x) / winW * 70;
            if ((!curSlide && diff < 0) || (curSlide === numOfSlides && diff > 0)) diff /= 2;
            $slider.css("transform", "translate3d("+ (-curSlide*100 - diff) +"%,0,0)");
            $slideBGs.css("transform", "translate3d("+ (curSlide*50 + diff/2) +"%,0,0)");
            });
        });
        
        $(document).on("mouseup touchend", function(e) {
            $(document).off("mousemove touchmove");
            if (animating) return;
            if (!diff) {
            changeSlides(true);
            return;
            }
            if (diff > -8 && diff < 8) {
            changeSlides();
            return;
            }
            if (diff <= -8) {
            navigateLeft();
            }
            if (diff >= 8) {
            navigateRight();
            }
        });
        
        $(document).on("click", ".slider-control", function() {
            if ($(this).hasClass("left")) {
            navigateLeft();
            } else {
            navigateRight();
            }
        });
        
        $(document).on("click", ".slider-pagi__elem", function() {
            curSlide = $(this).data("page");
            changeSlides();
        });
        
        });
  </script>

        // Function to generate slide HTML
        function generateSlideHTML(slide, index) {
            const linkAttrs = slide.url ? `href="${slide.url}" target="_blank" rel="noopener noreferrer"` : "";
            return `
                <div class="slide slide-${index}">
                    <div class="slide__bg" style="background-image: url('${slide.bgImage}');"></div>
                    <a class="slide__content" ${linkAttrs} aria-label="Open ${slide.title}">
                        <svg class="slide__overlay" viewBox="0 0 720 405" preserveAspectRatio="xMaxYMax slice">
                            <path class="slide__overlay-path" d="M0,0 150,0 250,405 0,405" />
                        </svg>
                        <div class="slide__text">
                            <p class="bubble_publication_conference">${slide.conference}</p>
                            <h2 class="slide__text-heading">${slide.title}</h2>
                            <p class="slide__text-desc">${slide.authors}</p>
                        </div>
                    </a>
                </div>
            `;
        }

        // Generate and insert slides
        const $slider = $(".slider");
        slidesData.forEach((slide, index) => {
            $slider.append(generateSlideHTML(slide, index));
        });

        // Set positions for each slide dynamically
        $(".slide").each(function(index) {
            $(this).css("left", (index * 100) + "%");
            $(this).find(".slide__bg").css("left", (-index * 50) + "%");
        });

        // Set the first slide as active
        $(".slide").first().addClass("active");

        // The rest of your existing JavaScript code...
        var $slideBGs = $(".slide__bg"),
            diff = 0,
            curSlide = 0,
            numOfSlides = $(".slide").length-1,
            animating = false,
            animTime = 500,
            autoSlideTimeout,
            autoSlideDelay = 6000,
            $pagination = $(".slider-pagi"),
            linkStartX = 0,
            linkStartY = 0,
            linkWasDragged = false;

        // ... (keep all the existing JavaScript functions and event listeners) ...
        function createBullets() {
          for (var i = 0; i < numOfSlides+1; i++) {
          var $li = $("<li class='slider-pagi__elem'></li>");
          $li.addClass("slider-pagi__elem-"+i).data("page", i);
          if (!i) $li.addClass("active");
          $pagination.append($li);
          }
      };
      
      createBullets();
      
      function manageControls() {
          $(".slider-control").removeClass("inactive");
          if (!curSlide) $(".slider-control.left").addClass("inactive");
          if (curSlide === numOfSlides) $(".slider-control.right").addClass("inactive");
      };
      
      function autoSlide() {
          autoSlideTimeout = setTimeout(function() {
          curSlide++;
          if (curSlide > numOfSlides) curSlide = 0;
          changeSlides();
          }, autoSlideDelay);
      };
      
      autoSlide();
      
      function changeSlides(instant) {
          if (!instant) {
          animating = true;
          manageControls();
          $slider.addClass("animating");
          $slider.css("top");
          $(".slide").removeClass("active");
          $(".slide-"+curSlide).addClass("active");
          setTimeout(function() {
              $slider.removeClass("animating");
              animating = false;
          }, animTime);
          }
          window.clearTimeout(autoSlideTimeout);
          $(".slider-pagi__elem").removeClass("active");
          $(".slider-pagi__elem-"+curSlide).addClass("active");
          $slider.css("transform", "translate3d("+ -curSlide*100 +"%,0,0)");
          $slideBGs.css("transform", "translate3d("+ curSlide*50 +"%,0,0)");
          diff = 0;
          autoSlide();
      }

      function navigateLeft() {
          if (animating) return;
          if (curSlide > 0) curSlide--;
          changeSlides();
      }

      function navigateRight() {
          if (animating) return;
          if (curSlide < numOfSlides) curSlide++;
          changeSlides();
      }

      $(document).on("mousedown touchstart", ".slider", function(e) {
          if (animating) return;
          window.clearTimeout(autoSlideTimeout);
          var startX = e.pageX || e.originalEvent.touches[0].pageX,
              winW = $(window).width();
          diff = 0;
          
          $(document).on("mousemove touchmove", function(e) {
          var x = e.pageX || e.originalEvent.touches[0].pageX;
          diff = (startX - x) / winW * 70;
          if ((!curSlide && diff < 0) || (curSlide === numOfSlides && diff > 0)) diff /= 2;
          $slider.css("transform", "translate3d("+ (-curSlide*100 - diff) +"%,0,0)");
          $slideBGs.css("transform", "translate3d("+ (curSlide*50 + diff/2) +"%,0,0)");
          });
      });

      $(document).on("mousedown touchstart", ".slide__content", function(e) {
          var point = e.originalEvent.touches ? e.originalEvent.touches[0] : e;
          linkStartX = point.pageX;
          linkStartY = point.pageY;
          linkWasDragged = false;
      });

      $(document).on("mousemove touchmove", function(e) {
          if (!linkStartX && !linkStartY) return;
          var point = e.originalEvent.touches ? e.originalEvent.touches[0] : e;
          if (Math.abs(point.pageX - linkStartX) > 8 || Math.abs(point.pageY - linkStartY) > 8) {
              linkWasDragged = true;
          }
      });
      
      $(document).on("mouseup touchend", function(e) {
          $(document).off("mousemove touchmove");
          if (animating) return;
          if (!diff) {
          changeSlides(true);
          return;
          }
          if (diff > -8 && diff < 8) {
          changeSlides();
          return;
          }
          if (diff <= -8) {
          navigateLeft();
          }
          if (diff >= 8) {
          navigateRight();
          }
      });
      
      $(document).on("click", ".slider-control", function() {
          if ($(this).hasClass("left")) {
          navigateLeft();
          } else {
          navigateRight();
          }
      });
      
      $(document).on("click", ".slider-pagi__elem", function() {
          curSlide = $(this).data("page");
          changeSlides();
      });

      $(document).on("click", ".slide__content", function(e) {
          if (linkWasDragged || animating) {
              e.preventDefault();
          }
          linkStartX = 0;
          linkStartY = 0;
          linkWasDragged = false;
      });
      
    });
    </script>
